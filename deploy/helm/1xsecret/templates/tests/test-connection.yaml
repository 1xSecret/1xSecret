{{- /*
Helm test: `helm test <release>` runs this pod, which checks the liveness
endpoint through the Service.
*/}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "1xsecret.fullname" . }}-test-connection
  labels:
    {{- /*
    Deliberately NOT the app selector labels — the Service selects on
    name+instance and must never route traffic to the test pod.
    */}}
    helm.sh/chart: {{ include "1xsecret.chart" . }}
    app.kubernetes.io/name: {{ include "1xsecret.name" . }}-test
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  containers:
    - name: wget
      image: busybox:1.37
      command:
        - wget
      args:
        - --spider
        - --timeout=10
        - {{ printf "http://%s:%v/api/health" (include "1xsecret.fullname" .) .Values.service.port | quote }}
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
