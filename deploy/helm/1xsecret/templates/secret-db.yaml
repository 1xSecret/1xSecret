{{- /*
Chart-rendered database Secret — DEV-ONLY convenience for `database.url`.
Never put production credentials in values files; point
`database.existingSecret` at an operator-managed Secret instead (e.g. the
`<cluster>-app` Secret generated by CloudNativePG).

The Secret is itself a pre-install/pre-upgrade hook with a negative weight:
the migration Job runs as a pre-install hook, i.e. BEFORE regular manifests
are applied, so the Secret must already exist at that point or a fresh
install would deadlock. `before-hook-creation` recreates it with current
values on every install/upgrade, and no success-delete policy is set, so it
persists for the Deployment to consume. (Being a hook resource it is not
removed by `helm uninstall` — acceptable for a dev-only convenience.)
*/}}
{{- if and .Values.database.url (not .Values.database.existingSecret.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "1xsecret.fullname" . }}-db
  labels:
    {{- include "1xsecret.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.database.url | quote }}
  {{- with .Values.database.replicaUrls }}
  DATABASE_REPLICA_URLS: {{ . | quote }}
  {{- end }}
{{- end }}
