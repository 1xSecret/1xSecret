# Publish @1xsecret/sdk to npm on `sdk-vX.Y.Z` tags via OIDC trusted publishing
# (no long-lived NPM_TOKEN). Prerequisite: a trusted publisher configured on
# npmjs.com for the @1xsecret/sdk package, pointing at repo 1xSecret/1xSecret
# and this workflow file (sdk-release.yml). npm has no "pending" publishers, so
# the package must be published once manually before OIDC releases can run.
#
# The SDK has its own release cadence (it changes far less often than the app).
# Its MAJOR version tracks the app — a breaking API or crypto-scheme change bumps
# both — while minor/patch are independent. The tag version must match
# sdk/package.json. Provenance is generated automatically by OIDC publishing.

name: Publish SDK

on:
  push:
    tags:
      - "sdk-v*"

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing (and provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Enable pnpm via corepack
        run: npm install -g corepack@latest && corepack enable pnpm

      - uses: actions/setup-node@v6
        with:
          node-version: 24 # >= 22.14.0, required by trusted publishing
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing needs npm CLI >= 11.5.1; the bundled npm may be older.
      - name: Ensure npm >= 11.5.1
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches sdk/package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#sdk-v}"
          PKG_VERSION="$(node -p "require('./sdk/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) != sdk/package.json version ($PKG_VERSION)" >&2
            exit 1
          fi

      - name: Build SDK
        run: pnpm -F @1xsecret/sdk build

      # OIDC trusted publishing: no NODE_AUTH_TOKEN. npm exchanges the GitHub
      # OIDC token for a short-lived credential and auto-attaches provenance.
      - name: Publish to npm (OIDC trusted publishing)
        working-directory: sdk
        run: npm publish
